<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏嵌入网页</title>
    <style>
        /* 移除浏览器默认的边距和滚动条，确保完全贴合屏幕 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* 设置底色，防止白屏闪烁 */
        }

        /* 核心：让 iframe 撑满整个视口 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 嵌入目标网页 -->
    <iframe src="https://misaliu.github.io/phi-chart-render/" allowfullscreen>    
        <p>您的浏览器不支持 iframe，请点击 <a href="https://misaliu.github.io/">这里</a> 访问。</p>
    </iframe>

</body>
</html>
