<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phira Mini Web Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让点击穿透到Canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: #fff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            letter-spacing: 1px;
        }
        #combo-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.1s;
        }
        #combo-num {
            font-size: 45px;
            font-weight: bold;
            font-style: italic;
        }
        #combo-text {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div class="header">
            <div id="track-name">Spitfire - Auto Simulation</div>
            <div id="score">0000000</div>
        </div>
        
        <div id="combo-container">
            <div id="combo-num">0</div>
            <div id="combo-text">Combo</div>
        </div>

        <button id="start-btn">点击初始化并开始</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const scoreEl = document.getElementById('score');
        const comboContainer = document.getElementById('combo-container');
        const comboNumEl = document.getElementById('combo-num');

        // --- 游戏配置参数 ---
        let isPlaying = false;
        let startTime = 0;
        let currentTime = 0; // 当前音乐进度 (秒)
        let score = 0;
        let combo = 0;
        
        // 谱面流速参数：1秒钟Note走过的像素距离 (iPad上建议根据屏幕高度动态调整)
        let speed = 400; 

        // --- Web Audio API 初始化 (防止浏览器拦截音频) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null;
        let audioSource = null;

        // 简易伪采样：生成一个小节的电子鼓点作为背景音乐数据
        function createDummyAudio() {
            const sampleRate = audioCtx.sampleRate;
            const duration = 15; // 模拟音频长15秒
            const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
            const data = buffer.getChannelData(0);
            
            // 在特定时间点生成“啪”的节拍声，方便对准音游节拍
            for (let i = 0; i < duration; i += 0.5) {
                const startIdx = Math.floor(i * sampleRate);
                for (let j = 0; j < 2000; j++) {
                    if (startIdx + j < data.length) {
                        data[startIdx + j] = Math.sin(j * 0.5) * Math.exp(-j * 0.01);
                    }
                }
            }
            audioBuffer = buffer;
        }

        // --- 模拟谱面数据 (Chart Data) ---
        // time: 击打时间(秒), xOffset: 相对于判定线中心的横向偏移
        const mockChart = [
            { time: 1.0, xOffset: -200, hit: false },
            { time: 1.5, xOffset: 0, hit: false },
            { time: 2.0, xOffset: 200, hit: false },
            { time: 2.5, xOffset: -100, hit: false },
            { time: 2.5, xOffset: 100, hit: false }, // 双押
            { time: 3.0, xOffset: 0, hit: false },
            { time: 3.5, xOffset: -300, hit: false },
            { time: 4.0, xOffset: 300, hit: false },
            { time: 4.5, xOffset: -150, hit: false },
            { time: 5.0, xOffset: 150, hit: false },
            { time: 5.5, xOffset: 0, hit: false },
            { time: 6.0, xOffset: -200, hit: false },
            { time: 6.5, xOffset: 200, hit: false },
            { time: 7.0, xOffset: 0, hit: false },
            { time: 7.5, xOffset: -100, hit: false },
            { time: 8.0, xOffset: 100, hit: false },
            { time: 8.5, xOffset: 0, hit: false },
            { time: 9.0, xOffset: -250, hit: false }
        ];

        // --- 自适应屏幕大小 ---
        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 核心业务逻辑：自动打谱 (Auto-Play) 与 状态更新 ---
        function update() {
            if (!isPlaying) return;

            // 计算当前绝对精确的音乐播放时间
            currentTime = audioCtx.currentTime - startTime;

            // 自动判定逻辑
            mockChart.forEach(note => {
                // 如果当前时间已经达到了 Note 的击打时间，且该 Note 还没被击碎
                if (currentTime >= note.time && !note.hit) {
                    note.hit = true; // 标记为已击中
                    combo++;
                    // Phigros 满分 1000000，按比例均分
                    score = Math.floor((mockChart.filter(n => n.hit).length / mockChart.length) * 1000000);
                    
                    // 更新UI
                    scoreEl.innerText = String(score).padStart(7, '0');
                    comboNumEl.innerText = combo;
                    comboContainer.style.opacity = combo > 0 ? '1' : '0';
                    
                    // 触发一个判定线打击视觉反馈（可以扩展粒子特效）
                    triggerHitEffect();
                }
            });

            // 结束判定
            if (currentTime > mockChart[mockChart.length - 1].time + 1) {
                isPlaying = false;
                startBtn.style.display = 'block';
                startBtn.innerText = '重播';
            }
        }

        // 打击特效标志位
        let hitFlash = 0;
        function triggerHitEffect() {
            hitFlash = 1.0;
        }

        // --- Canvas 渲染引擎 ---
        function render() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // 1. 清空画布
            ctx.fillStyle = '#0a0a14'; 
            ctx.fillRect(0, 0, width, height);

            // 绘制背景装饰线（类似Phira的科技感背景）
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for(let i=0; i<width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }

            // 2. 确定判定线（Judge Line）的位置
            // Phigros的判定线可以任意移动，这里我们默认将其初始化在屏幕 Y = 70% 的位置
            const judgeLineY = height * 0.7;
            const centerX = width / 2;

            // 绘制判定线本身
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, judgeLineY);
            ctx.lineTo(width, judgeLineY);
            ctx.stroke();

            // 绘制自动打谱提示 (AutoPlay 字符)
            ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('- AUTO PLAY -', centerX, judgeLineY + 30);

            // 绘制打击高亮特效
            if (hitFlash > 0) {
                ctx.fillStyle = `rgba(0, 229, 255, ${hitFlash * 0.2})`;
                ctx.fillRect(0, judgeLineY - 10, width, 20);
                hitFlash -= 0.05; // 渐隐
            }

            // 3. 渲染谱面当中的 Note
            mockChart.forEach(note => {
                // 如果已经击碎超过0.15秒，就不再渲染
                if (note.hit && (currentTime - note.time > 0.15)) return;

                // 计算 Note 当前与判定线的距离 = (Note时间 - 当前时间) * 流速
                // 如果 currentTime < note.time，distance > 0 (在判定线上方往下掉)
                const distance = (note.time - currentTime) * speed;
                const noteY = judgeLineY - distance; 
                const noteX = centerX + noteOffsetScale(note.xOffset, width);

                if (!note.hit) {
                    // 绘制常规蓝色 Tap Note (仿照 Phigros 经典样式)
                    const noteWidth = 110;
                    const noteHeight = 12;

                    ctx.save();
                    ctx.translate(noteX, noteY);

                    // Note 主体层
                    ctx.fillStyle = '#5ce1e6';
                    ctx.fillRect(-noteWidth/2, -noteHeight/2, noteWidth, noteHeight);
                    
                    // Note 边框线提高质感
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(-noteWidth/2, -noteHeight/2, noteWidth, noteHeight);

                    ctx.restore();
                } else {
                    // 如果被击中，渲染粒子爆裂动画
                    const progress = (currentTime - note.time) / 0.15; // 0 ~ 1 进度
                    ctx.fillStyle = `rgba(92, 225, 230, ${1 - progress})`;
                    ctx.beginPath();
                    ctx.arc(noteX, judgeLineY, progress * 40, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // 根据屏幕宽度自适应缩放谱面坐标偏移
        function noteOffsetScale(xOffset, canvasWidth) {
            // 基准宽度设为 1024px 进行比例缩放
            return xOffset * (canvasWidth / 1024);
        }

        // --- 主游戏循环 (Game Loop) ---
        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }

        // --- 交互控制 ---
        startBtn.addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            
            // 重置数据
            score = 0;
            combo = 0;
            mockChart.forEach(n => n.hit = false);
            scoreEl.innerText = "0000000";
            comboContainer.style.opacity = '0';

            // 创建并播放音频
            createDummyAudio();
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioCtx.destination);
            
            startBtn.style.display = 'none';
            startTime = audioCtx.currentTime;
            isPlaying = true;
            
            audioSource.start(0);
        });

        // 启动渲染循环
        requestAnimationFrame(loop);
    </script>
</body>
</html>
